<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Movie Explorer</title>
</head>
<body>
    <!-- search box -->
    <div class="container">
        <h1>🎬Movie Explorer</h1>
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchButton">Search</button>
        <div id="movieList"></div>
    </div>


    <!--main content -->
<div class="main_box">
  
        <!-- movie details -->
    <div class="movie_details">
                    
         <div id="trendingSection">
                        <h2>🔥Block Buster Movies</h2>
                        <div class="movie-grid" id="trendingMoviesList"></div>
         </div>

         <div id="searchSection" style="display:none;">
                <h2>🔎 Search Results</h2>
                <div class="movie-grid" id="searchResultsList"></div>
         </div>
    </div>

            <!--right content -->
            <div class="content">
                    <div class="Favourites">
                        <h3>❤️ Favourites <span class="count">(3)</span></h3>
                        <ul class="fav-list">
                         
                        </ul>
                    </div>

                    <div class="Searches">
                        <h3>🕒 Recent Searches</h3>
                        <ul class="search-list"  id="historyList">
                         
                        </ul>
                        <button class="clear-btn">Clear History</button>
                    </div>
            </div>
</div>


    <script src="script.js"></script>
</body>
</html>
